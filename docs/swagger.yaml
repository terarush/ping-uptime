definitions:
  entity.DailyChartPoint:
    properties:
      date:
        type: string
      failed:
        type: integer
      status:
        type: string
      total:
        type: integer
      uptime_pct:
        type: number
    type: object
  entity.NotificationLog:
    properties:
      channel_type:
        type: string
      error_message:
        type: string
      event_type:
        type: string
      id:
        type: integer
      incident_id:
        type: integer
      monitor_id:
        type: integer
      notification_id:
        type: integer
      recipient:
        type: string
      sent_at:
        type: string
      status:
        type: string
      user_id:
        type: integer
    type: object
  entity.Tag:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handler.attachTagsRequest:
    properties:
      tag_ids:
        items:
          type: integer
        type: array
    required:
    - tag_ids
    type: object
  handler.createTagRequest:
    properties:
      color:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handler.subscribeRequest:
    properties:
      email:
        type: string
      status_page_id:
        type: integer
    required:
    - email
    - status_page_id
    type: object
  handler.unsubscribeRequest:
    properties:
      email:
        type: string
      status_page_id:
        type: integer
    required:
    - email
    - status_page_id
    type: object
  handler.updateTagRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  request.CreateChannelRequest:
    properties:
      config:
        description: JSON config
        type: string
      enabled:
        type: boolean
      name:
        type: string
      type:
        type: string
    required:
    - config
    - name
    - type
    type: object
  request.CreateIncidentRequest:
    properties:
      error_message:
        type: string
      latency:
        type: integer
      monitor_id:
        type: integer
      status:
        type: string
    required:
    - monitor_id
    - status
    type: object
  request.CreateMaintenanceRequest:
    properties:
      description:
        type: string
      end_at:
        type: string
      monitor_ids:
        items:
          type: integer
        type: array
      name:
        type: string
      start_at:
        type: string
    required:
    - end_at
    - name
    - start_at
    type: object
  request.CreateMonitorRequest:
    properties:
      check_ssl:
        type: boolean
      interval:
        minimum: 1
        type: integer
      name:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      timeout:
        minimum: 5
        type: integer
      type:
        type: string
      url:
        type: string
    required:
    - interval
    - name
    - timeout
    - type
    - url
    type: object
  request.CreateStatusPageRequest:
    properties:
      description:
        type: string
      monitor_ids:
        items:
          type: integer
        type: array
      name:
        type: string
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  request.CreateTeamRequest:
    properties:
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  request.CreateTokenRequest:
    properties:
      expires_at:
        description: optional RFC3339
        type: string
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  request.InviteMemberRequest:
    properties:
      role:
        enum:
        - admin
        - member
        type: string
      user_id:
        type: integer
    required:
    - user_id
    type: object
  request.UpdateChannelRequest:
    properties:
      config:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      type:
        type: string
    required:
    - config
    - name
    - type
    type: object
  request.UpdateIncidentRequest:
    properties:
      error_message:
        type: string
      latency:
        type: integer
      status:
        type: string
    required:
    - status
    type: object
  request.UpdateMaintenanceRequest:
    properties:
      description:
        type: string
      end_at:
        type: string
      monitor_ids:
        items:
          type: integer
        type: array
      name:
        type: string
      start_at:
        type: string
    required:
    - end_at
    - name
    - start_at
    type: object
  request.UpdateMemberRequest:
    properties:
      role:
        enum:
        - admin
        - member
        type: string
    required:
    - role
    type: object
  request.UpdateMonitorRequest:
    properties:
      check_ssl:
        type: boolean
      interval:
        minimum: 1
        type: integer
      name:
        type: string
      status:
        type: string
      tag_ids:
        items:
          type: integer
        type: array
      timeout:
        minimum: 5
        type: integer
      type:
        type: string
      url:
        type: string
    required:
    - interval
    - name
    - status
    - timeout
    - type
    - url
    type: object
  request.UpdateStatusPageRequest:
    properties:
      description:
        type: string
      monitor_ids:
        items:
          type: integer
        type: array
      name:
        type: string
      slug:
        type: string
    required:
    - name
    - slug
    type: object
  request.UpdateTeamRequest:
    properties:
      name:
        maxLength: 100
        type: string
    required:
    - name
    type: object
  response.ChannelResponse:
    properties:
      config:
        type: string
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  response.CreateTokenResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      is_revoked:
        type: boolean
      last_used_at:
        type: string
      name:
        type: string
      raw_token:
        description: only returned once on create
        type: string
      token_prefix:
        type: string
    type: object
  response.IncidentResponse:
    properties:
      created_at:
        type: string
      error_message:
        type: string
      id:
        type: integer
      latency:
        type: integer
      monitor_id:
        type: integer
      resolved_at:
        type: string
      status:
        type: string
      user_id:
        type: integer
    type: object
  response.MaintenanceResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      end_at:
        type: string
      id:
        type: integer
      monitor_ids:
        items:
          type: integer
        type: array
      name:
        type: string
      start_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  response.MonitorResponse:
    properties:
      check_ssl:
        type: boolean
      created_at:
        type: string
      heartbeat_token:
        type: string
      id:
        type: integer
      interval:
        type: integer
      last_checked_at:
        type: string
      last_latency:
        type: integer
      name:
        type: string
      ssl_expires_at:
        type: string
      status:
        type: string
      tags:
        items:
          $ref: '#/definitions/entity.Tag'
        type: array
      timeout:
        type: integer
      type:
        type: string
      updated_at:
        type: string
      uptime_status:
        type: string
      url:
        type: string
      user_id:
        type: integer
    type: object
  response.StatusPageResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      monitors:
        items:
          $ref: '#/definitions/response.MonitorResponse'
        type: array
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  response.TeamMemberResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      invited_by:
        type: integer
      role:
        type: string
      status:
        type: string
      team_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/response.TeamMemberUser'
      user_id:
        type: integer
    type: object
  response.TeamMemberUser:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  response.TeamResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      member_count:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  response.TokenResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      is_revoked:
        type: boolean
      last_used_at:
        type: string
      name:
        type: string
      token_prefix:
        type: string
    type: object
  utils.ErrorResponseModel:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
    type: object
  utils.SuccessResponseModel:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /api-tokens:
    get:
      description: Get all API tokens for the authenticated user (admins see all)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/response.TokenResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: List API tokens
      tags:
      - API Tokens
    post:
      consumes:
      - application/json
      description: Generate a new API token. Raw token is only returned once.
      parameters:
      - description: Token details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.CreateTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.CreateTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Create API token
      tags:
      - API Tokens
  /api-tokens/{id}:
    delete:
      description: Revoke an API token by ID. Immediate loss of access.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Revoke API token
      tags:
      - API Tokens
  /api/audit-logs:
    get:
      consumes:
      - application/json
      description: Retrieve audit logs with optional filtering. Requires admin privileges.
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: integer
      - description: Filter by entity type (e.g. monitor, incident)
        in: query
        name: entity_type
        type: string
      - description: Filter by action (e.g. created, updated, deleted)
        in: query
        name: action
        type: string
      - description: Start date/time (RFC3339)
        in: query
        name: from
        type: string
      - description: End date/time (RFC3339)
        in: query
        name: to
        type: string
      - description: Max results to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] List audit logs'
      tags:
      - AuditLogs
  /api/audit-logs/search:
    get:
      consumes:
      - application/json
      description: Retrieve audit logs filtered by entity type and entity ID. Requires
        admin privileges.
      parameters:
      - description: Entity type (e.g. monitor, incident)
        in: query
        name: entity_type
        required: true
        type: string
      - description: Entity ID
        in: query
        name: entity_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] Search audit logs'
      tags:
      - AuditLogs
  /api/backup/download:
    get:
      consumes:
      - application/json
      description: Download a JSON backup file as an attachment. Requires admin privileges.
      produces:
      - application/json
      responses:
        "200":
          description: Backup JSON file download
          schema:
            type: file
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] Download backup as file'
      tags:
      - Backup
  /api/backup/export:
    get:
      consumes:
      - application/json
      description: Export all configuration data as a JSON backup. Requires admin
        privileges.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] Export backup data'
      tags:
      - Backup
  /api/backup/history:
    get:
      consumes:
      - application/json
      description: Retrieve backup/import history records. Requires admin privileges.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] List backup history'
      tags:
      - Backup
  /api/backup/history/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a backup/import history record by ID. Requires admin privileges.
      parameters:
      - description: Backup record ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] Delete backup history record'
      tags:
      - Backup
  /api/backup/import:
    post:
      consumes:
      - multipart/form-data
      description: Import configuration from a JSON backup file upload (multipart).
        Requires admin privileges.
      parameters:
      - description: Backup JSON file to import
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: '[Admin] Import backup data'
      tags:
      - Backup
  /api/heartbeat/{token}:
    post:
      consumes:
      - application/json
      description: Public endpoint to register a heartbeat ping from a monitor via
        its heartbeat token. Updates uptime status to "up" and resolves any active
        incidents.
      parameters:
      - description: Heartbeat token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponseModel'
            - properties:
                data:
                  $ref: '#/definitions/response.MonitorResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      summary: Receive heartbeat ping
      tags:
      - Monitors
  /api/incidents:
    get:
      consumes:
      - application/json
      description: Retrieves all incidents. Admins see all, regular users see only
        their own.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponseModel'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/response.IncidentResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: List all incidents
      tags:
      - Incidents
    post:
      consumes:
      - application/json
      description: Creates a new incident for a monitor. Only the monitor owner or
        an admin can create incidents.
      parameters:
      - description: Incident details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.CreateIncidentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponseModel'
            - properties:
                data:
                  $ref: '#/definitions/response.IncidentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Create an incident
      tags:
      - Incidents
  /api/incidents/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes an incident by ID. Only the owner or an admin can delete.
      parameters:
      - description: Incident ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/utils.SuccessResponseModel'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Delete an incident
      tags:
      - Incidents
    get:
      consumes:
      - application/json
      description: Retrieves a single incident by ID. Users can only access their
        own incidents; admins can access any.
      parameters:
      - description: Incident ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponseModel'
            - properties:
                data:
                  $ref: '#/definitions/response.IncidentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
      security:
      - BearerAuth: []
      summary: Get incident by ID
      tags:
      - Incidents
    put:
      consumes:
      - application/json
      description: Updates an incident by ID. Only the owner or an admin can update.
      parameters:
      - description: Incident ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated incident details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.UpdateIncidentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponseModel'
            - properties:
                data:
                  $ref: '#/definitions/response.IncidentResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponseModel'
        "401":
