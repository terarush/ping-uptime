openapi: "3.0.3"
info:
  title: Ping Uptime API
  description: Website monitoring and uptime tracking API
  version: "1.0.0"
servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://your-instance.com/api
    description: Production

paths:
  /auth/setup-status:
    get:
      tags: [Auth]
      summary: Check if system setup is complete
      operationId: getSetupStatus
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_setup:
                    type: boolean
                  system_name:
                    type: string
                  allow_registration:
                    type: boolean

  /auth/setup:
    post:
      tags: [Auth]
      summary: Perform initial admin setup
      operationId: setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh expired access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New tokens

  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user (if enabled)
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/verify:
    get:
      tags: [Users]
      summary: Verify authenticated user
      operationId: verifyUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users:
    get:
      tags: [Users]
      summary: List all users
      operationId: getUsers
      security:
        - BearerAuth: []
        - AdminAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
    post:
      tags: [Users]
      summary: Create user
      operationId: createUser
      security:
        - BearerAuth: []
        - AdminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUser
      security:
        - BearerAuth: []
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      security:
        - BearerAuth: []
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      security:
        - BearerAuth: []
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted

  /monitors/events:
    get:
      tags: [Monitors]
      summary: SSE stream for real-time monitor events
      operationId: streamMonitorEvents
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

  /heartbeat/{token}:
    post:
      tags: [Monitors]
      summary: Register heartbeat ping
      operationId: handleHeartbeat
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Heartbeat registered

  /monitors:
    get:
      tags: [Monitors]
      summary: List all monitors
      operationId: getMonitors
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Monitor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonitorResponse"
    post:
      tags: [Monitors]
      summary: Create monitor
      operationId: createMonitor
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitorRequest"
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorResponse"

  /monitors/{id}:
    get:
      tags: [Monitors]
      summary: Get monitor by ID
      operationId: getMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorResponse"
    put:
      tags: [Monitors]
      summary: Update monitor
      operationId: updateMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonitorRequest"
      responses:
        "200":
          description: Monitor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorResponse"
    delete:
      tags: [Monitors]
      summary: Delete monitor
      operationId: deleteMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Monitor deleted

  /incidents:
    get:
      tags: [Incidents]
      summary: List all incidents
      operationId: getIncidents
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Incident list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentResponse"
    post:
      tags: [Incidents]
      summary: Create incident
      operationId: createIncident
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
      responses:
        "201":
          description: Incident created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentResponse"

  /incidents/{id}:
    get:
      tags: [Incidents]
      summary: Get incident by ID
      operationId: getIncident
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentResponse"
    put:
      tags: [Incidents]
      summary: Update incident
      operationId: updateIncident
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentRequest"
      responses:
        "200":
          description: Incident updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentResponse"
    delete:
      tags: [Incidents]
      summary: Delete incident
      operationId: deleteIncident
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incident deleted

  /incidents/monitor/{monitorId}:
    get:
      tags: [Incidents]
      summary: Get incidents by monitor
      operationId: getIncidentsByMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: monitorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Incidents for monitor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentResponse"

  /notification-channels:
    get:
      tags: [Notification Channels]
      summary: List notification channels
      operationId: getNotificationChannels
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Channel list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelResponse"
    post:
      tags: [Notification Channels]
      summary: Create notification channel
      operationId: createNotificationChannel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"

  /notification-channels/{id}:
    get:
      tags: [Notification Channels]
      summary: Get notification channel by ID
      operationId: getNotificationChannel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"
    put:
      tags: [Notification Channels]
      summary: Update notification channel
      operationId: updateNotificationChannel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResponse"
    delete:
      tags: [Notification Channels]
      summary: Delete notification channel
      operationId: deleteNotificationChannel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel deleted

  /notification-logs:
    get:
      tags: [Notification Logs]
      summary: List notification delivery logs
      operationId: getNotificationLogs
      security:
        - BearerAuth: []
      parameters:
        - name: channel_type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, failed]
        - name: event_type
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Notification logs

  /integrations:
    get:
      tags: [Integrations]
      summary: List integrations
      operationId: getIntegrations
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationResponse"
    post:
      tags: [Integrations]
      summary: Create integration
      operationId: createIntegration
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationRequest"
      responses:
        "201":
          description: Integration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"

  /integrations/{id}:
    put:
      tags: [Integrations]
      summary: Update integration
      operationId: updateIntegration
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntegrationRequest"
      responses:
        "200":
          description: Integration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
    delete:
      tags: [Integrations]
      summary: Delete integration
      operationId: deleteIntegration
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Integration deleted
    post:
      tags: [Integrations]
      summary: Test integration connection
      operationId: testIntegration
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result

  /backup/export:
    get:
      tags: [Backup]
      summary: Export system configuration
      operationId: exportBackup
      security:
        - BearerAuth: []
        - AdminAuth: []
      responses:
        "200":
          description: Configuration JSON

  /backup/download:
    get:
      tags: [Backup]
      summary: Download backup file
      operationId: downloadBackup
      security:
        - BearerAuth: []
        - AdminAuth: []
      responses:
        "200":
          description: Backup JSON file

  /backup/import:
    post:
      tags: [Backup]
      summary: Import configuration
      operationId: importBackup
      security:
        - BearerAuth: []
        - AdminAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import result

  /backup/history:
    get:
      tags: [Backup]
      summary: Get backup history
      operationId: getBackupHistory
      security:
        - BearerAuth: []
        - AdminAuth: []
      responses:
        "200":
          description: Backup history

  /backup/history/{id}:
    delete:
      tags: [Backup]
      summary: Delete backup record
      operationId: deleteBackupRecord
      security:
        - BearerAuth: []
        - AdminAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record deleted

  /maintenances:
    get:
      tags: [Maintenances]
      summary: List maintenances
      operationId: getMaintenances
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Maintenance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceResponse"
    post:
      tags: [Maintenances]
      summary: Create maintenance window
      operationId: createMaintenance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMaintenanceRequest"
      responses:
        "201":
          description: Maintenance created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceResponse"

  /maintenances/{id}:
    get:
      tags: [Maintenances]
      summary: Get maintenance by ID
      operationId: getMaintenance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Maintenance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceResponse"
    put:
      tags: [Maintenances]
      summary: Update maintenance
      operationId: updateMaintenance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMaintenanceRequest"
      responses:
        "200":
          description: Maintenance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceResponse"
    delete:
      tags: [Maintenances]
      summary: Delete maintenance
      operationId: deleteMaintenance
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Maintenance deleted

  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      operationId: getAuditLogs
      security:
        - BearerAuth: []
        - AdminAuth: []
      responses:
        "200":
          description: Audit log entries

  /audit-logs/search:
    get:
      tags: [Audit Logs]
      summary: Search audit logs
      operationId: searchAuditLogs
      security:
        - BearerAuth: []
        - AdminAuth: []
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Filtered audit logs

  /api-tokens:
    get:
      tags: [API Tokens]
      summary: List API tokens
      operationId: getApiTokens
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TokenResponse"
    post:
      tags: [API Tokens]
      summary: Create API token
      operationId: createApiToken
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenResponse"

  /api-tokens/{id}:
    delete:
      tags: [API Tokens]
      summary: Revoke API token
      operationId: revokeApiToken
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token revoked

  /ssl-monitors:
    get:
      tags: [SSL Monitors]
      summary: List SSL certificates
      operationId: getSslMonitors
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSL certificate list

  /ssl-monitors/{id}:
    get:
      tags: [SSL Monitors]
      summary: Get SSL certificate by ID
      operationId: getSslMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSL certificate
    delete:
      tags: [SSL Monitors]
      summary: Delete SSL certificate record
      operationId: deleteSslMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSL certificate deleted

  /ssl-monitors/check/{monitorId}:
    post:
      tags: [SSL Monitors]
      summary: Check SSL for specific monitor
      operationId: checkSslMonitor
      security:
        - BearerAuth: []
      parameters:
        - name: monitorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSL check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  monitor_id:
                    type: integer
                  domain:
                    type: string
                  status:
                    type: string
                  error:
                    type: string

  /ssl-monitors/check-all:
    post:
      tags: [SSL Monitors]
      summary: Check SSL for all monitors
      operationId: checkAllSsl
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSL check results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    monitor_id:
                      type: integer
                    domain:
                      type: string
                    status:
                      type: string
                    error:
                      type: string

  /ssl-monitors/expiring:
    get:
      tags: [SSL Monitors]
      summary: Get expiring certificates
      operationId: getExpiringSsl
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Expiring certificates

  /settings/public/system-name:
    get:
      tags: [Settings]
      summary: Get public system name
      operationId: getPublicSystemName
      responses:
        "200":
          description: System name
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: string

  /settings:
    get:
      tags: [Settings]
      summary: List all settings
      operationId: getSettings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Setting list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettingResponse"
    post:
      tags: [Settings]
      summary: Save setting
      operationId: saveSetting
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveSettingRequest"
      responses:
        "200":
          description: Setting saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingResponse"

  /settings/{key}:
    get:
      tags: [Settings]
      summary: Get setting by key
      operationId: getSetting
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingResponse"
    delete:
      tags: [Settings]
      summary: Delete setting
      operationId: deleteSetting
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting deleted

  /tags:
    get:
      tags: [Tags]
      summary: List tags
      operationId: getTags
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Tag list
    post:
      tags: [Tags]
      summary: Create tag
      operationId: createTag
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
