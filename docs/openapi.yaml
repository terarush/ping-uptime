components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (15min expiry). Obtain via POST /auth/login
    AdminAuth:
      type: apiKey
      in: header
      name: X-Admin-Role
      description: User must have admin role

  schemas:
    CreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          default: member
        is_blocked:
          type: boolean
          default: false

    UpdateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
        is_blocked:
          type: boolean

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        is_blocked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMonitorRequest:
      type: object
      required: [name, url, type, interval, timeout]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [http, ping, port, heartbeat]
        interval:
          type: integer
          minimum: 1
        timeout:
          type: integer
          minimum: 5
        check_ssl:
          type: boolean
          default: false

    UpdateMonitorRequest:
      type: object
      required: [name, url, type, interval, timeout, status]
      properties:
        name:
          type: string
        url:
          type: string
          format: uri
        type:
          type: string
          enum: [http, ping, port, heartbeat]
        interval:
          type: integer
          minimum: 1
        timeout:
          type: integer
          minimum: 5
        status:
          type: string
          enum: [active, paused]
        check_ssl:
          type: boolean

    MonitorResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        type:
          type: string
        interval:
          type: integer
        timeout:
          type: integer
        status:
          type: string
        uptime_status:
          type: string
        last_checked_at:
          type: string
          format: date-time
          nullable: true
        last_latency:
          type: integer
        check_ssl:
          type: boolean
        ssl_expires_at:
          type: string
          format: date-time
          nullable: true
        heartbeat_token:
          type: string
          nullable: true
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateIncidentRequest:
      type: object
      required: [monitor_id, status]
      properties:
        monitor_id:
          type: integer
        status:
          type: string
          enum: [down, degraded]
        error_message:
          type: string
        latency:
          type: integer

    UpdateIncidentRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
        error_message:
          type: string
        latency:
          type: integer

    IncidentResponse:
      type: object
      properties:
        id:
          type: integer
        monitor_id:
          type: integer
        user_id:
          type: integer
        status:
          type: string
        error_message:
          type: string
        latency:
          type: integer
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true

    CreateChannelRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [email, slack, discord, webhook, telegram, sms]
        config:
          type: string
          description: JSON-stringified provider settings
        enabled:
          type: boolean
          default: true

    UpdateChannelRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: string
        enabled:
          type: boolean

    ChannelResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        config:
          type: string
        enabled:
          type: boolean
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateIntegrationRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          maxLength: 100
        type:
          type: string
          enum: [slack, discord, webhook, github, pagerduty]
        config:
          type: string

    UpdateIntegrationRequest:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          maxLength: 100
        type:
          type: string
        config:
          type: string
        enabled:
          type: boolean

    IntegrationResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
        config:
          type: string
        enabled:
          type: boolean
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMaintenanceRequest:
      type: object
      required: [name, start_at, end_at]
      properties:
        name:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        monitor_ids:
          type: array
          items:
            type: integer

    UpdateMaintenanceRequest:
      type: object
      required: [name, start_at, end_at]
      properties:
        name:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        monitor_ids:
          type: array
          items:
            type: integer

    MaintenanceResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, ongoing, completed, cancelled]
        user_id:
          type: integer
        monitor_ids:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTokenRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        expires_at:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        token_prefix:
          type: string
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        is_revoked:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateTokenResponse:
      allOf:
        - $ref: "#/components/schemas/TokenResponse"
        - type: object
          properties:
            raw_token:
              type: string
              description: Full token shown only on creation

    SaveSettingRequest:
      type: object
      required: [key]
      properties:
        key:
          type: string
        value:
          type: string
        description:
          type: string

    SettingResponse:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateStatusPageRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        monitor_ids:
          type: array
          items:
            type: integer

    UpdateStatusPageRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        monitor_ids:
          type: array
          items:
            type: integer

    StatusPageResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        user_id:
          type: integer
        monitors:
          type: array
          items:
            $ref: "#/components/schemas/MonitorResponse"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100

    UpdateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100

    TeamResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        member_count:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string

    InviteMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
        role:
          type: string
          enum: [admin, member]
          default: member

    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    TeamMemberResponse:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
        user_id:
          type: integer
        role:
          type: string
        status:
          type: string
          enum: [pending, accepted, rejected]
        invited_by:
          type: integer
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            name:
              type: string
        created_at:
          type: string
        updated_at:
          type: string
