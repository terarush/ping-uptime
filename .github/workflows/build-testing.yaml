name: Build & Test

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: ping_uptime_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure environment variables for test
        run: |
          cp .env.example .env
          sed -i 's/DB_NAME=database/DB_NAME=ping_uptime_test/g' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=/g' .env
          sed -i 's/DB_HOST=localhost/DB_HOST=127.0.0.1/g' .env

      - name: Install Dependencies
        run: go mod download

      - name: Generate Swagger Docs
        run: go install github.com/swaggo/swag/cmd/swag@latest && swag init --parseDependency --parseDepth 2 -g main.go

      - name: Run Go Tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Build Go Binary
        run: go build -v ./...

  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npm run type-check

      # - name: Run Unit Tests
      #   run: npm run test:unit -- --run

      - name: Build Frontend
        run: npm run build-only
