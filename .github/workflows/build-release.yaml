name: Build & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  release:
    types:
      - published

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    environment: build
    if: github.event_name == 'release' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GT_TOKEN }}
          default_bump: patch
          custom_release_rules: feat:patch:Features
          initial_version: 0.0.1

      - name: Determine Version Tag
        id: determine_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: rafia9005/ping-uptime
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}
            type=raw,value=${{ steps.determine_tag.outputs.tag }}
            type=semver,pattern={{version}},value=${{ steps.determine_tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.determine_tag.outputs.tag }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build
          cd ..

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Linux Binary
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ping-uptime main.go

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.determine_tag.outputs.tag }}
          name: "Release ${{ steps.determine_tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ping-uptime
        env:
          GITHUB_TOKEN: ${{ secrets.GT_TOKEN }}
